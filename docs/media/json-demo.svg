<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13" width="720" height="360">
  <defs>
    <linearGradient id="frameBg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .label { fill: #94a3b8; font-size: 11px; }
      .key { fill: #93c5fd; }
      .str { fill: #fcd34d; }
      .num { fill: #34d399; }
      .punc { fill: #cbd5e1; }
      .input { fill: #f1f5f9; }
      .tab { fill: #64748b; }
      .tab-active { fill: #3b82f6; }
      .border { stroke: #334155; fill: none; }
      .accent { fill: #3b82f6; }
    </style>
  </defs>

  <!-- Frame -->
  <rect x="0" y="0" width="720" height="360" rx="12" fill="url(#frameBg)"/>

  <!-- Header bar -->
  <rect x="0" y="0" width="720" height="36" fill="#1e293b"/>
  <circle cx="16" cy="18" r="5" fill="#3b82f6"/>
  <text x="30" y="22" fill="#e2e8f0" font-size="13" font-weight="600" font-family="ui-sans-serif">
    DevKit Toolbox · JSON Formatter
  </text>

  <!-- Mode tabs -->
  <g transform="translate(20, 56)">
    <rect width="60" height="22" rx="4" class="tab-active" opacity="0.18"/>
    <text x="30" y="15" text-anchor="middle" fill="#3b82f6" font-size="11" font-weight="600" font-family="ui-sans-serif">Format</text>
    <rect x="68" width="60" height="22" rx="4" fill="#1e293b"/>
    <text x="98" y="15" text-anchor="middle" class="tab" font-size="11" font-family="ui-sans-serif">Minify</text>
    <rect x="136" width="78" height="22" rx="4" fill="#1e293b"/>
    <text x="175" y="15" text-anchor="middle" class="tab" font-size="11" font-family="ui-sans-serif">JSONPath</text>
  </g>

  <!-- Input box -->
  <g transform="translate(20, 92)">
    <text class="label">INPUT</text>
    <rect x="0" y="8" width="320" height="120" rx="6" class="border" stroke-width="1"/>
    <g transform="translate(10, 28)" font-size="12">
      <!-- Animated typing: each line fades in sequentially -->
      <text class="input" y="0">
        <tspan class="punc">{</tspan>
        <animate attributeName="opacity" from="0" to="1" begin="0s" dur="0.3s" fill="freeze"/>
      </text>
      <text class="input" y="18">
        <tspan>  </tspan><tspan class="key">"user"</tspan><tspan class="punc">:</tspan><tspan class="punc">{</tspan><tspan class="key">"name"</tspan><tspan class="punc">:</tspan><tspan class="str">"Ada"</tspan><tspan class="punc">,</tspan><tspan class="key">"age"</tspan><tspan class="punc">:</tspan><tspan class="num">36</tspan><tspan class="punc">}</tspan><tspan class="punc">,</tspan>
        <animate attributeName="opacity" from="0" to="1" begin="0.3s" dur="0.3s" fill="freeze"/>
      </text>
      <text class="input" y="36">
        <tspan>  </tspan><tspan class="key">"tags"</tspan><tspan class="punc">:</tspan><tspan class="punc">[</tspan><tspan class="str">"engineer"</tspan><tspan class="punc">,</tspan><tspan class="str">"author"</tspan><tspan class="punc">]</tspan>
        <animate attributeName="opacity" from="0" to="1" begin="0.6s" dur="0.3s" fill="freeze"/>
      </text>
      <text class="input" y="54">
        <tspan class="punc">}</tspan>
        <animate attributeName="opacity" from="0" to="1" begin="0.9s" dur="0.3s" fill="freeze"/>
      </text>
    </g>
  </g>

  <!-- Arrow -->
  <g transform="translate(350, 170)">
    <path d="M0 0 L24 0 M18 -6 L24 0 L18 6" class="border" stroke="#3b82f6" stroke-width="2" fill="none"/>
  </g>

  <!-- Output box -->
  <g transform="translate(380, 92)">
    <text class="label">OUTPUT</text>
    <rect x="0" y="8" width="320" height="200" rx="6" class="border" stroke-width="1"/>
    <g transform="translate(10, 28)" font-size="12" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="1.4s" dur="0.4s" fill="freeze"/>
      <text class="input" y="0"><tspan class="punc">{</tspan></text>
      <text class="input" y="18"><tspan>  </tspan><tspan class="key">"user"</tspan><tspan class="punc">: {</tspan></text>
      <text class="input" y="36"><tspan>    </tspan><tspan class="key">"name"</tspan><tspan class="punc">: </tspan><tspan class="str">"Ada"</tspan><tspan class="punc">,</tspan></text>
      <text class="input" y="54"><tspan>    </tspan><tspan class="key">"age"</tspan><tspan class="punc">: </tspan><tspan class="num">36</tspan></text>
      <text class="input" y="72"><tspan>  </tspan><tspan class="punc">},</tspan></text>
      <text class="input" y="90"><tspan>  </tspan><tspan class="key">"tags"</tspan><tspan class="punc">: [</tspan></text>
      <text class="input" y="108"><tspan>    </tspan><tspan class="str">"engineer"</tspan><tspan class="punc">,</tspan></text>
      <text class="input" y="126"><tspan>    </tspan><tspan class="str">"author"</tspan></text>
      <text class="input" y="144"><tspan>  </tspan><tspan class="punc">]</tspan></text>
      <text class="input" y="162"><tspan class="punc">}</tspan></text>
    </g>
    <!-- Copy button -->
    <g transform="translate(260, 12)" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="1.8s" dur="0.3s" fill="freeze"/>
      <rect width="48" height="20" rx="4" class="accent" opacity="0.18"/>
      <text x="24" y="14" text-anchor="middle" fill="#60a5fa" font-size="10" font-weight="600" font-family="ui-sans-serif">Copy</text>
    </g>
  </g>

  <!-- Caption -->
  <text x="360" y="338" text-anchor="middle" class="label" font-size="11">
    Format JSON, run JSONPath queries, copy — all offline.
  </text>
</svg>
