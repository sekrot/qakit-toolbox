name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-zip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - run: mkdir -p dist-zip && cd dist && zip -r ../dist-zip/qakit-toolbox-${{ github.ref_name }}.zip . -x '*.map'
      - uses: softprops/action-gh-release@v2
        with:
          files: dist-zip/qakit-toolbox-${{ github.ref_name }}.zip
          generate_release_notes: true
